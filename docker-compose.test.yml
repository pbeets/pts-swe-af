# Test environment for the streaming executor.
#
# Uses non-conflicting ports (18080/18090) so it can run alongside
# development services.
#
# Usage:
#   cd code/examples/af-swe
#   docker compose -f docker-compose.test.yml up --build
#   docker compose -f docker-compose.test.yml down -v

services:
  control-plane:
    image: agentfield/control-plane:latest
    ports:
      - "18080:8080"
    environment:
      - AGENTFIELD_HTTP_ADDR=0.0.0.0:8080
      - AGENTFIELD_STORAGE_MODE=local
    volumes:
      - agentfield-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  swe-af:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18090:8090"
    environment:
      - AGENTFIELD_SERVER=http://control-plane:8080
      - PLANDB_DB=/data/plandb/plandb.db
      - NODE_ID=swe-planner
    volumes:
      - plandb-data:/data/plandb
      - artifacts:/data/artifacts
    depends_on:
      control-plane:
        condition: service_healthy

volumes:
  agentfield-data:
  plandb-data:
  artifacts:
